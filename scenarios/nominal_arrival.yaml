schema_version: "1.0.0"
scenario_id: scenario.nominal-arrival
title: Whole-home evening arrival
description: Eight coordinated rooms and devices produce fresh declared effects from one goal.
simulation_only: true
clock_start_at: "2026-07-13T12:00:00Z"
goal:
  goal_id: goal.arrival
  objective: Prepare the simulated environment for arrival in five minutes
  requested_at: "2026-07-13T12:00:00Z"
  deadline: "2026-07-13T12:05:00Z"
  acceptance_conditions:
    - condition_id: condition.garage-open
      description: Garage door is open
      entity_id: garage.main
      property_id: door_state
      operator: equals
      target_value: open
    - condition_id: condition.charger-ready
      description: Charger reports ready
      entity_id: charger.home
      property_id: readiness
      operator: equals
      target_value: ready
    - condition_id: condition.climate-ready
      description: Living-room setpoint is within tolerance
      entity_id: room.living
      property_id: temperature_setpoint
      operator: within
      target_value: 22.0
      unit: degrees_celsius
      tolerance: 0.5
    - condition_id: condition.media-ready
      description: Living-room media begins the usual evening program
      entity_id: media.living
      property_id: playback_state
      operator: equals
      target_value: playing
    - condition_id: condition.lighting-welcome
      description: Living-room lighting reports the welcome scene
      entity_id: lighting.living
      property_id: scene
      operator: equals
      target_value: welcome
    - condition_id: condition.fan-comfort
      description: Living-room fan reports the preferred low setting
      entity_id: fan.living
      property_id: speed
      operator: equals
      target_value: low
    - condition_id: condition.ice-making
      description: Kitchen ice maker reports active production
      entity_id: ice-maker.kitchen
      property_id: production_state
      operator: equals
      target_value: making
    - condition_id: condition.coffee-ready
      description: Guarded kitchen coffee routine reports ready
      entity_id: coffee.kitchen
      property_id: brew_state
      operator: equals
      target_value: ready
capabilities:
  - capability_id: garage.open
    version: "1.0.0"
    adapter_id: adapter.simulator
    target_entity_id: garage.main
    description: Open the simulated garage door
    operation: write
    risk_class: R2
    authorization: none
    expected_effects:
      - condition_id: effect.garage-open
        description: Garage door becomes open
        entity_id: garage.main
        property_id: door_state
        operator: equals
        target_value: open
    completion_evidence:
      - condition_id: evidence.garage-open
        description: Fresh telemetry reports the garage open
        entity_id: garage.main
        property_id: door_state
        operator: equals
        target_value: open
    timeout_seconds: 5.0
    max_attempts: 1
    idempotency: key_required
    supported_modes: [simulation]
  - capability_id: charger.prepare
    version: "1.0.0"
    adapter_id: adapter.simulator
    target_entity_id: charger.home
    description: Prepare the simulated charger without energizing it
    operation: write
    risk_class: R1
    authorization: none
    expected_effects:
      - condition_id: effect.charger-ready
        description: Charger becomes ready
        entity_id: charger.home
        property_id: readiness
        operator: equals
        target_value: ready
    completion_evidence:
      - condition_id: evidence.charger-ready
        description: Fresh charger telemetry reports ready
        entity_id: charger.home
        property_id: readiness
        operator: equals
        target_value: ready
    timeout_seconds: 5.0
    max_attempts: 1
    idempotency: key_required
    supported_modes: [simulation]
  - capability_id: climate.set-target
    version: "1.0.0"
    adapter_id: adapter.simulator
    target_entity_id: room.living
    description: Set the simulated living-room temperature target
    operation: write
    risk_class: R1
    authorization: none
    parameters:
      - name: target
        value_type: number
        description: Requested simulated temperature setpoint
        required: true
        unit: degrees_celsius
        minimum: 16.0
        maximum: 30.0
    expected_effects:
      - condition_id: effect.climate-ready
        description: Temperature setpoint becomes the requested target
        entity_id: room.living
        property_id: temperature_setpoint
        operator: within
        target_value: 22.0
        unit: degrees_celsius
        tolerance: 0.5
    completion_evidence:
      - condition_id: evidence.climate-ready
        description: Fresh climate telemetry reports the target
        entity_id: room.living
        property_id: temperature_setpoint
        operator: within
        target_value: 22.0
        unit: degrees_celsius
        tolerance: 0.5
    timeout_seconds: 5.0
    max_attempts: 1
    idempotency: key_required
    supported_modes: [simulation]
  - capability_id: coffee.brew-arrival
    version: "1.0.0"
    adapter_id: adapter.simulator
    target_entity_id: coffee.kitchen
    description: Brew simulated arrival coffee after guarded readiness checks
    operation: write
    risk_class: R2
    authorization: none
    preconditions:
      - condition_id: precondition.coffee-water
        description: Coffee maker water reservoir is available
        entity_id: coffee.kitchen
        property_id: water_available
        operator: is_true
      - condition_id: precondition.coffee-cup
        description: Coffee cup sensor reports present
        entity_id: coffee.kitchen
        property_id: cup_present
        operator: is_true
      - condition_id: precondition.coffee-arrival-confidence
        description: Destination confidence supports the arrival routine
        entity_id: vehicle.primary
        property_id: destination_confidence
        operator: greater_than_or_equal
        target_value: 0.8
        unit: ratio
    expected_effects:
      - condition_id: effect.coffee-ready
        description: Simulated coffee routine becomes ready
        entity_id: coffee.kitchen
        property_id: brew_state
        operator: equals
        target_value: ready
    completion_evidence:
      - condition_id: evidence.coffee-ready
        description: Fresh coffee-maker telemetry reports ready
        entity_id: coffee.kitchen
        property_id: brew_state
        operator: equals
        target_value: ready
    timeout_seconds: 5.0
    max_attempts: 1
    idempotency: key_required
    supported_modes: [simulation]
  - capability_id: fan.set-comfort
    version: "1.0.0"
    adapter_id: adapter.simulator
    target_entity_id: fan.living
    description: Set the simulated living-room fan to the preferred arrival speed
    operation: write
    risk_class: R1
    authorization: none
    expected_effects:
      - condition_id: effect.fan-comfort
        description: Living-room fan becomes low
        entity_id: fan.living
        property_id: speed
        operator: equals
        target_value: low
    completion_evidence:
      - condition_id: evidence.fan-comfort
        description: Fresh fan telemetry reports low
        entity_id: fan.living
        property_id: speed
        operator: equals
        target_value: low
    timeout_seconds: 5.0
    max_attempts: 1
    idempotency: key_required
    supported_modes: [simulation]
  - capability_id: ice.prepare
    version: "1.0.0"
    adapter_id: adapter.simulator
    target_entity_id: ice-maker.kitchen
    description: Start simulated kitchen ice production
    operation: write
    risk_class: R1
    authorization: none
    expected_effects:
      - condition_id: effect.ice-making
        description: Ice production becomes active
        entity_id: ice-maker.kitchen
        property_id: production_state
        operator: equals
        target_value: making
    completion_evidence:
      - condition_id: evidence.ice-making
        description: Fresh ice-maker telemetry reports active production
        entity_id: ice-maker.kitchen
        property_id: production_state
        operator: equals
        target_value: making
    timeout_seconds: 5.0
    max_attempts: 1
    idempotency: key_required
    supported_modes: [simulation]
  - capability_id: lighting.set-welcome
    version: "1.0.0"
    adapter_id: adapter.simulator
    target_entity_id: lighting.living
    description: Set the simulated living-room welcome lighting scene
    operation: write
    risk_class: R1
    authorization: none
    expected_effects:
      - condition_id: effect.lighting-welcome
        description: Lighting scene becomes welcome
        entity_id: lighting.living
        property_id: scene
        operator: equals
        target_value: welcome
    completion_evidence:
      - condition_id: evidence.lighting-welcome
        description: Fresh lighting telemetry reports the welcome scene
        entity_id: lighting.living
        property_id: scene
        operator: equals
        target_value: welcome
    timeout_seconds: 5.0
    max_attempts: 1
    idempotency: key_required
    supported_modes: [simulation]
  - capability_id: media.resume-usual
    version: "1.0.0"
    adapter_id: adapter.simulator
    target_entity_id: media.living
    description: Resume the simulated program associated with the evening arrival preference
    operation: write
    risk_class: R1
    authorization: none
    parameters:
      - name: program
        value_type: string
        description: Allowlisted simulated program to resume
        required: true
        allowed_values: [Orbit Seven]
    expected_effects:
      - condition_id: effect.media-playing
        description: Media playback becomes active
        entity_id: media.living
        property_id: playback_state
        operator: equals
        target_value: playing
      - condition_id: effect.media-program
        description: Media reports the usual evening program
        entity_id: media.living
        property_id: program
        operator: equals
        target_value: Orbit Seven
    completion_evidence:
      - condition_id: evidence.media-playing
        description: Fresh media telemetry reports active playback
        entity_id: media.living
        property_id: playback_state
        operator: equals
        target_value: playing
      - condition_id: evidence.media-program
        description: Fresh media telemetry reports the usual evening program
        entity_id: media.living
        property_id: program
        operator: equals
        target_value: Orbit Seven
    timeout_seconds: 5.0
    max_attempts: 1
    idempotency: key_required
    supported_modes: [simulation]
initial_observations:
  - observation_id: observation.destination-confidence
    entity_id: vehicle.primary
    property_id: destination_confidence
